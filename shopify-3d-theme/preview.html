<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉLAN STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0b08;font-family:'Inter',sans-serif}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}

#enter-ui{
  position:fixed;bottom:9vh;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;align-items:center;gap:1.2rem;
  transition:opacity 0.7s;
}
#store-name{
  font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:300;
  letter-spacing:.55em;color:#f5efe0;text-transform:uppercase;text-align:center;
  text-shadow:0 0 40px rgba(200,160,60,.45);
}
#store-name em{color:#c8a040;font-style:normal}
#store-tagline{font-size:.46rem;letter-spacing:.62em;color:rgba(200,160,80,.55);text-transform:uppercase}
#enter-btn{
  background:transparent;border:1px solid rgba(200,160,60,.7);
  color:#c8a040;font-family:'Inter',sans-serif;font-size:.52rem;font-weight:300;
  letter-spacing:.8em;text-transform:uppercase;padding:1.05rem 4rem;
  cursor:pointer;transition:all .35s;margin-top:.4rem;
}
#enter-btn:hover{background:rgba(200,160,60,.12);border-color:#c8a040;color:#f5efe0;box-shadow:0 0 30px rgba(200,160,60,.15)}

#shop-bar{
  position:fixed;top:-64px;left:0;right:0;z-index:200;height:56px;
  display:flex;align-items:center;justify-content:space-between;padding:0 2rem;
  background:rgba(13,11,8,.96);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(200,160,60,.14);
  transition:top .5s cubic-bezier(.16,1,.3,1);
}
#shop-bar.show{top:0}
#exit-btn{background:none;border:1px solid rgba(200,160,60,.25);color:#806030;
  font-size:.5rem;letter-spacing:.45em;text-transform:uppercase;
  padding:.5rem 1.2rem;cursor:pointer;transition:all .3s}
#exit-btn:hover{border-color:#c8a040;color:#c8a040}
#bar-logo{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;
  letter-spacing:.42em;color:#f0ece4;text-transform:uppercase}
#bar-logo em{color:#c8a040;font-style:normal}
#shop-all{background:#c8a040;color:#0d0b08;border:none;font-size:.5rem;font-weight:400;
  letter-spacing:.42em;text-transform:uppercase;padding:.5rem 1.4rem;
  cursor:pointer;transition:opacity .25s}
#shop-all:hover{opacity:.82}

#hint{position:fixed;bottom:2.2rem;left:50%;transform:translateX(-50%);
  font-size:.48rem;letter-spacing:.52em;text-transform:uppercase;
  color:rgba(200,160,80,.38);z-index:100;opacity:0;pointer-events:none;transition:opacity .8s}
#hint.show{opacity:1}

#overlay{position:fixed;inset:0;z-index:300;background:transparent;pointer-events:none;transition:background .4s}
#overlay.on{background:rgba(0,0,0,.65);pointer-events:all}
#panel{
  position:fixed;top:0;right:0;bottom:0;width:400px;z-index:400;
  background:#100c08;border-left:1px solid rgba(200,160,60,.1);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .52s cubic-bezier(.16,1,.3,1);
}
#panel.open{transform:translateX(0)}
#p-img{position:relative;width:100%;height:260px;flex-shrink:0;overflow:hidden}
#p-canvas{width:100%;height:100%;display:block}
#p-close{position:absolute;top:1rem;right:1rem;z-index:10;
  background:rgba(13,11,8,.75);border:1px solid rgba(200,160,60,.28);
  color:#c8a040;width:34px;height:34px;cursor:pointer;font-size:.78rem;transition:background .2s}
#p-close:hover{background:rgba(200,160,60,.14)}
#p-body{padding:1.8rem;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.82rem}
#p-cat{font-size:.44rem;letter-spacing:.58em;text-transform:uppercase;color:#c8a040}
#p-name{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:#f0ece4;line-height:1.05}
.prices{display:flex;align-items:baseline;gap:.8rem}
#p-price{font-size:1.12rem;color:#f0ece4}
#p-was{font-size:.85rem;color:#2e2014;text-decoration:line-through}
.sep{height:1px;background:linear-gradient(90deg,rgba(200,160,60,.2),transparent)}
#p-desc{font-size:.74rem;color:#5a4028;line-height:1.75}
.lbl{font-size:.43rem;letter-spacing:.46em;text-transform:uppercase;color:#3a2812}
#sizes{display:flex;gap:.5rem;flex-wrap:wrap}
.sz{border:1px solid rgba(200,160,60,.18);background:none;color:#4a3018;
  font-size:.6rem;padding:.4rem .85rem;cursor:pointer;transition:all .2s;letter-spacing:.1em}
.sz:hover,.sz.on{border-color:#c8a040;color:#c8a040}
#p-add{background:linear-gradient(135deg,#c8a040,#a07820);color:#0d0b08;border:none;
  padding:1rem;font-size:.56rem;letter-spacing:.56em;text-transform:uppercase;
  cursor:pointer;font-weight:400;transition:opacity .2s;margin-top:.15rem}
#p-add:hover{opacity:.88}
#p-detail{color:#c8a040;text-decoration:none;font-size:.5rem;letter-spacing:.38em;
  text-transform:uppercase;text-align:center;padding:.55rem;
  border:1px solid rgba(200,160,60,.16);display:block;transition:all .2s}
#p-detail:hover{background:rgba(200,160,60,.06)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="enter-ui">
  <div id="store-name">ÉLAN <em>STUDIO</em></div>
  <div id="store-tagline">Luxury Ready-to-Wear</div>
  <button id="enter-btn">Enter Boutique</button>
</div>
<div id="shop-bar">
  <button id="exit-btn">← Exit</button>
  <div id="bar-logo">ÉLAN <em>STUDIO</em></div>
  <button id="shop-all">Shop All ↗</button>
</div>
<div id="hint">Hover &amp; click any garment to explore</div>
<div id="overlay"></div>
<div id="panel">
  <div id="p-img"><canvas id="p-canvas"></canvas><button id="p-close">✕</button></div>
  <div id="p-body">
    <p id="p-cat"></p><h2 id="p-name"></h2>
    <div class="prices"><span id="p-price"></span><span id="p-was"></span></div>
    <div class="sep"></div><p id="p-desc"></p>
    <p class="lbl">Select Size</p>
    <div id="sizes">
      <button class="sz on">XS</button><button class="sz">S</button>
      <button class="sz">M</button><button class="sz">L</button><button class="sz">XL</button>
    </div>
    <button id="p-add">Add to Bag</button>
    <a id="p-detail" href="#">View Full Details →</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
/* ── Frustum patch for null boundingSphere ── */
!function(){
  var o=THREE.Frustum.prototype.intersectsObject;
  THREE.Frustum.prototype.intersectsObject=function(obj){
    var g=obj.geometry;
    if(g&&g.boundingSphere===null){try{g.computeBoundingSphere();}catch(e){}}
    if(g&&!g.boundingSphere)return true;
    try{return o.call(this,obj);}catch(e){return true;}
  };
}();

(function(){
'use strict';

/* ══════════ PRODUCTS ══════════ */
const PRODS=[
  {id:'silk-wrap-dress',   name:'The Silk Wrap Dress',  cat:'New Arrival', price:'₹4,999', was:'₹6,500', desc:'Floor-length mulberry silk, bias-cut, self-tie waist.',         c:0xb83040,h:'#b83040'},
  {id:'linen-blazer-set',  name:'Linen Blazer Co-ord',  cat:'Trending',    price:'₹7,499', was:null,     desc:'Wide-leg trousers and structured blazer in natural linen.',     c:0x4a3c28,h:'#4a3c28'},
  {id:'ivory-midi',        name:'The Ivory Midi',        cat:'Featured',    price:'₹3,999', was:'₹5,500', desc:'Broderie anglaise ivory midi with smocked bodice.',             c:0xf0e8d8,h:'#d8c8a8'},
  {id:'rust-kurta',        name:'Rust Kurta Co-ord',     cat:'Ethnic Edit', price:'₹3,299', was:null,     desc:'Straight-cut rust orange kurta with printed palazzos.',        c:0xc84820,h:'#c84820'},
  {id:'olive-cargo',       name:'Olive Cargo Dress',     cat:'Casual',      price:'₹2,799', was:null,     desc:'Relaxed olive utility dress with patch pockets.',              c:0x4a5c28,h:'#4a5c28'},
  {id:'navy-suit',         name:'The Navy Power Suit',   cat:'Formal',      price:'₹8,999', was:'₹12,000',desc:'Double-breasted Italian crepe suit in deep navy.',             c:0x1a2860,h:'#1a2860'},
  {id:'blush-coord',       name:'Blush Satin Co-ord',    cat:'Evening',     price:'₹5,499', was:null,     desc:'Blush pink satin crop and wide-leg set.',                      c:0xe8a8a0,h:'#e8a8a0'},
  {id:'black-gown',        name:'The Evening Gown',      cat:'Signature',   price:'₹9,999', was:'₹14,000',desc:'Deep black floor-sweeping gown, ruched silk bodice, open back.',c:0x18141c,h:'#18141c'},
];

/* ══════════ RENDERER ══════════ */
const CV=document.getElementById('c');
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0c0a07);
scene.fog=new THREE.Fog(0x0c0a07,55,100);

const cam=new THREE.PerspectiveCamera(48,W()/H(),.1,200);
cam.position.set(0,7.5,34);
cam.lookAt(0,6,0);

const ren=new THREE.WebGLRenderer({canvas:CV,antialias:true});
ren.setSize(W(),H());
ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=false;
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=1.22;

/* ══════════ SCENE DIMS ══════════ */
const BW=22,       // building width
      BH_LO=7,     // lower floor height
      BH_UP=6,     // upper floor height
      BH=BH_LO+BH_UP, // total 13
      INT_D=32,    // interior depth
      DW=4.0;      // door width (each half = 2)

/* ══════════ HELPERS ══════════ */
const clickables=[];

function box(w,h,d,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); scene.add(m); return m;
}
function plane(w,h,mat,x,y,z,rx,ry){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  m.position.set(x,y,z);
  if(rx)m.rotation.x=rx; if(ry)m.rotation.y=ry;
  m.receiveShadow=true; scene.add(m); return m;
}

/* ══════════ MATERIALS (flat colours – no map textures) ══════════ */
const M={
  // Exterior stone: warm travertine/limestone (lit by uplights)
  stone:      new THREE.MeshStandardMaterial({color:0xd4cabb,roughness:.78,metalness:.04}),
  stoneDark:  new THREE.MeshStandardMaterial({color:0x2a2218,roughness:.82,metalness:.06}),
  // Gold frame / trim
  gold:       new THREE.MeshStandardMaterial({color:0xc8a040,metalness:.95,roughness:.06}),
  goldD:      new THREE.MeshStandardMaterial({color:0x9a7820,metalness:.92,roughness:.12}),
  // Jali bars (dark metal/charcoal — contrasts with stone)
  jaliBar:    new THREE.MeshStandardMaterial({color:0x1e1810,roughness:.55,metalness:.2}),
  // Glass
  glass:      new THREE.MeshStandardMaterial({color:0xb8d8e8,transparent:true,opacity:.18,roughness:.0,metalness:.05,depthWrite:false,side:THREE.DoubleSide}),
  glassTint:  new THREE.MeshStandardMaterial({color:0x88a8c0,transparent:true,opacity:.25,roughness:.0,metalness:.06,depthWrite:false,side:THREE.DoubleSide}),
  // Interior walls: very warm cream
  intWall:    new THREE.MeshStandardMaterial({color:0xede0cc,roughness:.82,metalness:.01}),
  // Interior ceiling: warm honey (exposed plank)
  intCeil:    new THREE.MeshStandardMaterial({color:0xc8904a,roughness:.5,metalness:.02}),
  // Dark exposed timber beams
  beam:       new THREE.MeshStandardMaterial({color:0x28180a,roughness:.82,metalness:.02}),
  // Clothing rack metal (matte black)
  rack:       new THREE.MeshStandardMaterial({color:0x141008,roughness:.6,metalness:.25}),
  // Display wood (light oak)
  dispWood:   new THREE.MeshStandardMaterial({color:0xb07838,roughness:.35,metalness:.03}),
  // Mannequin
  mannq:      new THREE.MeshStandardMaterial({color:0xf0e4d4,roughness:.35,metalness:.02}),
  // Steps marble
  steps:      new THREE.MeshStandardMaterial({color:0xe8e0d0,roughness:.2,metalness:.08}),
  // Ground dark granite
  gnd:        new THREE.MeshStandardMaterial({color:0x181410,roughness:.42,metalness:.18}),
  // Emissive panel for canopy ceiling glow
  glow:       new THREE.MeshStandardMaterial({color:0xffe8a0,emissive:0xffe8a0,emissiveIntensity:.9}),
  // Back wall art canvas
  art:        new THREE.MeshStandardMaterial({color:0xf8f2e8,roughness:.88}),
};

/* ══════════ FLOOR TEXTURE (herringbone – one canvas, shared) ══════════ */
(function(){
  const s=1024,cv=document.createElement('canvas');cv.width=cv.height=s;
  const x=cv.getContext('2d');
  // Base colour: honey oak
  x.fillStyle='#b87838'; x.fillRect(0,0,s,s);
  // Herringbone plank tiles
  const pw=52,pl=108; // plank width, length
  x.save();
  x.strokeStyle='rgba(55,28,8,.45)'; x.lineWidth=1.5;
  // 45° herringbone
  for(let r=-4;r<14;r++){
    for(let c=-4;c<22;c++){
      // Left-leaning plank
      x.save();
      x.translate(c*pw*2,r*pl);
      x.rotate(Math.PI/4);
      x.fillStyle=`hsl(${28+((r+c)%3)*4},52%,${40+((r*3+c)%5)*3}%)`;
      x.fillRect(-pw*.5,-pl*.5,pw,pl);
      x.strokeRect(-pw*.5,-pl*.5,pw,pl);
      for(let g=1;g<4;g++){x.beginPath();x.moveTo(-pw*.5,-pl*.5+g*(pl/4));x.lineTo(pw*.5,-pl*.5+g*(pl/4));x.globalAlpha=.18;x.stroke();x.globalAlpha=1;}
      x.restore();
      // Right-leaning plank
      x.save();
      x.translate(c*pw*2+pw,r*pl);
      x.rotate(-Math.PI/4);
      x.fillStyle=`hsl(${26+((r*2+c)%4)*4},50%,${38+((r+c*2)%5)*3}%)`;
      x.fillRect(-pw*.5,-pl*.5,pw,pl);
      x.strokeRect(-pw*.5,-pl*.5,pw,pl);
      for(let g=1;g<4;g++){x.beginPath();x.moveTo(-pw*.5,-pl*.5+g*(pl/4));x.lineTo(pw*.5,-pl*.5+g*(pl/4));x.globalAlpha=.18;x.stroke();x.globalAlpha=1;}
      x.restore();
    }
  }
  x.restore();
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(6,8);
  M.floor=new THREE.MeshStandardMaterial({map:t,roughness:.28,metalness:.04});
})();

/* ══════════ 3D JALI LATTICE PANEL BUILDER ══════════ */
/* Actual geometry bars — no texture needed */
function makeJali(W,H,cellSz,barW,barD,fg,bg){
  const G=new THREE.Group();
  // Background dark panel
  const bgM=bg||new THREE.MeshStandardMaterial({color:0x100c08,roughness:.9});
  const bgP=new THREE.Mesh(new THREE.BoxGeometry(W,H,barD*.3),bgM);
  bgP.position.z=-barD*.3; G.add(bgP);
  const fgMat=fg||M.jaliBar;
  // Vertical bars
  const cols=Math.round(W/cellSz)+1;
  for(let i=0;i<cols;i++){
    const bx=-W/2+i*cellSz;
    const b=new THREE.Mesh(new THREE.BoxGeometry(barW,H+barW,barD),fgMat);
    b.position.set(bx,0,0); G.add(b);
  }
  // Horizontal bars
  const rows=Math.round(H/cellSz)+1;
  for(let j=0;j<rows;j++){
    const by=-H/2+j*cellSz;
    const b=new THREE.Mesh(new THREE.BoxGeometry(W+barW,barW,barD),fgMat);
    b.position.set(0,by,0); G.add(b);
  }
  return G;
}

/* ══════════ NIGHT SKY ══════════ */
(function(){
  const s=512,cv=document.createElement('canvas');cv.width=cv.height=s;
  const x=cv.getContext('2d');
  const g=x.createLinearGradient(0,0,0,s);
  g.addColorStop(0,'#080610'); g.addColorStop(.5,'#0e0c18'); g.addColorStop(.85,'#1e140a'); g.addColorStop(1,'#160e06');
  x.fillStyle=g; x.fillRect(0,0,s,s);
  for(let i=0;i<700;i++){const sx=Math.random()*s,sy=Math.random()*s*.62;const r=Math.random()*.7+.12;x.beginPath();x.arc(sx,sy,r,0,Math.PI*2);x.fillStyle=`rgba(255,248,220,${.12+Math.random()*.7})`;x.fill();}
  // Orange horizon
  const hg=x.createRadialGradient(s*.5,s*.82,5,s*.5,s*.82,s*.55);
  hg.addColorStop(0,'rgba(220,130,40,.28)'); hg.addColorStop(1,'transparent');
  x.fillStyle=hg; x.fillRect(0,0,s,s);
  const sky=new THREE.Mesh(new THREE.SphereGeometry(120,28,14),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),side:THREE.BackSide}));
  sky.geometry.computeBoundingSphere(); scene.add(sky);
})();

/* ══════════ LIGHTING ══════════ */
// Ambient: very dark warm (let uplights do the work)
scene.add(new THREE.AmbientLight(0x1a1008,2.2));

// Key directional (no shadow — keeps shader within texture unit limit)
const sun=new THREE.DirectionalLight(0xffeedd,1.6);
sun.position.set(2,18,22); sun.target.position.set(0,6,0);
scene.add(sun,sun.target);

// Facade uplights (4 warm cones washing the stone) — no shadows
function addUplight(x,z,col,int,ang){
  const s=new THREE.SpotLight(col,int,26,ang||Math.PI/9,.4,1.0);
  s.position.set(x,.2,z); s.target.position.set(x,BH*.65,0);
  scene.add(s,s.target);
}
addUplight(-7,  6, 0xffcc60, 28);
addUplight(-2.5,6, 0xffbb50, 24);
addUplight( 2.5,6, 0xffbb50, 24);
addUplight( 7,  6, 0xffcc60, 28);

// Canopy soffit lights
[-5,-1.8,1.8,5].forEach(lx=>{
  const s=new THREE.SpotLight(0xfff0c8,16,12,Math.PI/11,.45,1.2);
  s.position.set(lx,BH_LO-.15,5.5); s.target.position.set(lx,.5,1.5);
  scene.add(s,s.target);
});

// Jali panel side-lit (warm gold washes upper facade)
[-5,5].forEach(lx=>{
  const p=new THREE.PointLight(0xffaa40,8,14,2);
  p.position.set(lx,BH_LO+BH_UP*.5,.5); scene.add(p);
});

// Interior fill — point lights spread through store (no shadows)
scene.add(new THREE.AmbientLight(0xffcc80,.85));
[[-6,-8],[0,-8],[6,-8],[-6,-16],[0,-16],[6,-16],[-5,-24],[5,-24]].forEach(([lx,lz])=>{
  const p=new THREE.PointLight(0xffcc80,8,14,1.6);
  p.position.set(lx,BH_LO-.5,lz); scene.add(p);
});
// Wall accents
const wl1=new THREE.PointLight(0xffbb60,4,22); wl1.position.set(-BW/2+1,3,-INT_D/2); scene.add(wl1);
const wl2=new THREE.PointLight(0xffbb60,4,22); wl2.position.set( BW/2-1,3,-INT_D/2); scene.add(wl2);

/* ══════════ GROUND ══════════ */
const gndM=new THREE.Mesh(new THREE.PlaneGeometry(120,60),M.gnd);
gndM.rotation.x=-Math.PI/2; gndM.position.set(0,-.02,14);
gndM.receiveShadow=true; scene.add(gndM);

/* ══════════ EXTERIOR BUILDING ══════════ */

/* ─── WINGS (side walls + roof) ─── */
const wingThk=3.2,wingH=BH+1;
// Left wing
box(wingThk,wingH,INT_D+2,M.stoneDark, -BW/2-wingThk/2+.1, wingH/2-.5, -INT_D/2+4);
// Right wing
box(wingThk,wingH,INT_D+2,M.stoneDark,  BW/2+wingThk/2-.1, wingH/2-.5, -INT_D/2+4);
// Roof slab
box(BW+wingThk*2+.5,.8,INT_D+2,M.stoneDark, 0, BH+.4-.5, -INT_D/2+4);

/* ─── OUTER GOLD FRAME ─── */
const FT=.48,FD=.38; // frame thickness, depth
// Verticals
box(FT,BH+.9,FD,M.gold, -BW/2-FT/2, BH/2+.45, .02);
box(FT,BH+.9,FD,M.gold,  BW/2+FT/2, BH/2+.45, .02);
// Bottom sill
box(BW+FT*2,.55,FD,M.gold, 0, -.28, .02);
// Top cornice
box(BW+FT*2,.7,FD*1.4,M.gold, 0, BH+.45, .02);
// Floor divider band
box(BW+FT*2,.52,FD,M.gold, 0, BH_LO, .02);

/* ─── UPPER FLOOR ─── */
const upperY=BH_LO+BH_UP/2;

// Stone backing for upper floor
box(BW,BH_UP-.25,.25,M.stone, 0,upperY,-.14);

// Left jali panel
const jL=makeJali(7.5,BH_UP-.7, .5,.1,.22);
jL.position.set(-(BW/2-3.75-FT),upperY,.05);
scene.add(jL);

// Right jali panel
const jR=makeJali(7.5,BH_UP-.7, .5,.1,.22);
jR.position.set( (BW/2-3.75-FT),upperY,.05);
scene.add(jR);

// ─ Centre brand panel (light stone recess with gold lettering) ─
(function(){
  const cpW=5.8,cpH=BH_UP-.8;
  // Gold border frame around centre panel
  box(cpW+.28,.06,.28,M.gold, 0, upperY+cpH/2+.03, .08);
  box(cpW+.28,.06,.28,M.gold, 0, upperY-cpH/2-.03, .08);
  box(.06,cpH+.12,.28,M.gold, -cpW/2-.03, upperY, .08);
  box(.06,cpH+.12,.28,M.gold,  cpW/2+.03, upperY, .08);
  // Stone panel
  box(cpW,cpH,.16,M.stone, 0,upperY,-.02);
  // Text canvas (brand name in gold on stone)

function mannequin(prod,px,pz,ry){
  const G=new THREE.Group(); G.rotation.y=ry||0;
  const oM=new THREE.MeshStandardMaterial({color:prod.c,roughness:.5,metalness:.04,side:THREE.DoubleSide});

  function add(geo,mat,x,y,z){
    const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z);
    m.castShadow=true; G.add(m); return m;
  }

  // Base + pole
  add(new THREE.CylinderGeometry(.38,.38,.05,20),M.gold,0,.025,0);
  add(new THREE.CylinderGeometry(.016,.016,1.1,8),M.gold,0,.6,0);
  // Legs
  [-0.09,.09].forEach(ox=>add(new THREE.CylinderGeometry(.054,.046,.96,10),M.mannq,ox,1.53,0));
  add(new THREE.SphereGeometry(.22,14,10),M.mannq,0,2.06,0); // hips
  add(new THREE.CylinderGeometry(.16,.21,.88,16),M.mannq,0,2.55,0); // torso
  add(new THREE.SphereGeometry(.18,14,10),M.mannq,0,3.02,0); // chest
  // Arms
  [-0.26,.26].forEach(ox=>{
    add(new THREE.SphereGeometry(.072,10,8),M.mannq,ox,3.12,0);
    add(new THREE.CylinderGeometry(.05,.042,.48,10),M.mannq,ox+(ox>0?.05:-.05),2.82,0);
  });
  add(new THREE.CylinderGeometry(.062,.078,.28,12),M.mannq,0,3.22,0); // neck
  add(new THREE.SphereGeometry(.13,16,12),M.mannq,0,3.42,0); // head

  // Skirt / dress (LatheGeometry)
  const pts=[];
  for(let i=0;i<=20;i++){const t=i/20;pts.push(new THREE.Vector2(.24+t*.38+Math.sin(t*Math.PI)*.1,2.0-t*1.4));}
  const skirt=new THREE.Mesh(new THREE.LatheGeometry(pts,28),oM);
  skirt.castShadow=true; skirt.userData={isProduct:true,product:prod};
  G.add(skirt); clickables.push(skirt);

  // Bodice
  const bod=add(new THREE.CylinderGeometry(.162,.215,.82,18),oM,0,2.45,0);
  bod.userData={isProduct:true,product:prod}; clickables.push(bod);

  G.position.set(px,0,pz); scene.add(G);
}

/* ══════════ RAYCASTER ══════════ */
const RC=new THREE.Raycaster();
const MP=new THREE.Vector2();
let hovM=null, inside=false, entering=false;

function setMP(e){
  const cx=e.clientX!==undefined?e.clientX:(e.touches?.[0]?.clientX||0);
  const cy=e.clientY!==undefined?e.clientY:(e.touches?.[0]?.clientY||0);
  MP.x=(cx/W())*2-1; MP.y=-(cy/H())*2+1;
}

let lTX=0,lTY=2.5;
const CAM_INSIDE_Z=-3.5;

document.addEventListener('mousemove',e=>{
  setMP(e);
  if(inside){lTX=(e.clientX/W()-.5)*6;lTY=2.2+(0.5-e.clientY/H())*1.4;}
  if(!inside)return;
  RC.setFromCamera(MP,cam);
  const hits=RC.intersectObjects(clickables,false);
  if(hits.length&&hits[0].object.userData.isProduct){
    const h=hits[0].object;
    if(hovM!==h){
      if(hovM&&hovM._orig){hovM.material=hovM._orig;hovM._orig=null;}
      hovM=h; h._orig=h.material;
      const hm=h.material.clone();
      hm.emissive=new THREE.Color(0xffffff); hm.emissiveIntensity=.18;
      h.material=hm;
    }
    document.body.style.cursor='pointer';
  } else {
    if(hovM&&hovM._orig){hovM.material=hovM._orig;hovM._orig=null;hovM=null;}
    document.body.style.cursor='default';
  }
});

/* Listen on canvas for click — real user clicks bubble up; dispatched clicks need target=canvas */
document.getElementById('c').addEventListener('click',e=>{
  if(!inside)return; setMP(e);
  RC.setFromCamera(MP,cam);
  const hits=RC.intersectObjects(clickables,false);
  if(hits.length&&hits[0].object.userData.isProduct)openPanel(hits[0].object.userData.product);
});

const enterUI=document.getElementById('enter-ui');

  const cs={z:34,y:7.5,fov:48};

    .to(cs,{z:8,y:5.5,duration:1.3,ease:'power1.in',

      onUpdate(){cam.position.z=cs.z;cam.position.y=cs.y;cam.fov=cs.fov;cam.updateProjectionMatrix();cam.lookAt(0,3.5,0);}})
    // Settle inside
    .to(cs,{z:CAM_INSIDE_Z,y:2.6,fov:52,duration:.85,ease:'power2.out',

    onUpdate(){cam.position.z=cs.z;cam.position.y=cs.y;cam.fov=cs.fov;cam.updateProjectionMatrix();cam.lookAt(0,6.5,0);}})

const panelEl=document.getElementById('panel');
const overlayEl=document.getElementById('overlay');
const pCv=document.getElementById('p-canvas');
const pCtx=pCv.getContext('2d');

function openPanel(prod){
  pCv.width=pCv.offsetWidth||400; pCv.height=pCv.offsetHeight||260;
  const PW=pCv.width,PH=pCv.height;
  const bg=pCtx.createLinearGradient(0,0,PW,PH);
  bg.addColorStop(0,prod.h); bg.addColorStop(1,'#0e0a06');
  pCtx.fillStyle=bg; pCtx.fillRect(0,0,PW,PH);
  for(let i=1;i<6;i++){pCtx.beginPath();pCtx.arc(PW*.5,PH*.4,i*30,0,Math.PI*2);pCtx.strokeStyle='rgba(255,255,255,.035)';pCtx.lineWidth=1;pCtx.stroke();}
  pCtx.font='300 '+Math.floor(PH*.18)+'px Cormorant Garamond,serif';
  pCtx.fillStyle='rgba(255,255,255,.06)'; pCtx.textAlign='center'; pCtx.textBaseline='middle';
  pCtx.fillText(prod.name,PW/2,PH/2);
  document.getElementById('p-cat').textContent=prod.cat;
  document.getElementById('p-name').textContent=prod.name;
  document.getElementById('p-price').textContent=prod.price;
  document.getElementById('p-was').textContent=prod.was||'';
  document.getElementById('p-desc').textContent=prod.desc;
  document.getElementById('p-detail').href='/products/'+prod.id;
  panelEl.classList.add('open'); overlayEl.classList.add('on');
}
function closePanel(){panelEl.classList.remove('open');overlayEl.classList.remove('on');}
document.getElementById('p-close').addEventListener('click',closePanel);
overlayEl.addEventListener('click',closePanel);
document.querySelectorAll('.sz').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sz').forEach(s=>s.classList.remove('on'));b.classList.add('on');
}));

/* ══════════ ANIMATION LOOP ══════════ */
const clk=new THREE.Clock();
let lCX=0,lCY=2.6;
function tick(){
  requestAnimationFrame(tick);
  const t=clk.getElapsedTime();
  if(inside){lCX+=(lTX-lCX)*.042;lCY+=(lTY-lCY)*.042;cam.lookAt(lCX,lCY,CAM_INSIDE_Z-10);}
  ren.render(scene,cam);
}
tick();

window.addEventListener('resize',()=>{
  cam.aspect=W()/H(); cam.updateProjectionMatrix(); ren.setSize(W(),H());
});
})();
</script>
